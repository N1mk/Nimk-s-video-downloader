<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 250px;
      padding: 12px;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #333;
      font-size: 14px;
    }
    .field-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #ff0000;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc0000;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h3>Загрузка трека / видео</h3>
  
  <div class="field-group">
    <label for="formatSelect">Выберите формат:</label>
    <select id="formatSelect">
      <option value="mp3">MP3 (Аудио)</option>
      <option value="mp4">MP4 (Видео)</option>
    </select>
  </div>

  <button id="sendBtn">Скачать</button>
  <div id="status">Ожидание действия...</div>
  
  <script src="popup.js"></script>
</body>
</html>
